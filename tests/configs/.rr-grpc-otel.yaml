version: '3'

rpc:
  listen: "tcp://127.0.0.1:6001"

server:
  command: "php php_test_files/worker-grpc.php"
  relay: "pipes"
  relay_timeout: "20s"

logs:
  mode: development
  level: debug

grpc:
  listen: "tcp://127.0.0.1:9092"
  proto:
    - "proto/service/service.proto"
  ping_time: 1s
  timeout: 200s
  pool:
    num_workers: 2
    allocate_timeout: 60s
    destroy_timeout: 60s

