version: '3'

rpc:
  listen: "tcp://127.0.0.1:6021"

server:
  command: "php php_test_files/worker-grpc.php"
  relay: "pipes"
  relay_timeout: "20s"

logs:
  mode: development
  level: error

# GRPC service configuration with server reflection backed by the protoreg plugin
grpc:
  listen: "tcp://127.0.0.1:9099"

  proto:
    - "proto/service/service.proto"

  pool:
    num_workers: 1
    max_jobs: 0
    allocate_timeout: 60s
    destroy_timeout: 60s

# protoreg parses the same proto files and exposes a descriptor registry that
# backs gRPC server reflection.
protoreg:
  proto_path:
    - "proto/service"
  files:
    - "service.proto"
